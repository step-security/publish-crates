[[IgnoredVulns]]
id = "GHSA-2mjp-6q6p-2qxm"
reason = "undici@5.29.0 is pulled in transitively by @actions/github@6.x. Bumping @actions/github to 8.x+ (which uses undici@^6.23.0) breaks the jest CJS test runtime because @octokit/core@7 is ESM-only. We only call github.graphql() against api.github.com (trusted endpoint), so request/response smuggling is not exploitable in our usage."

[[IgnoredVulns]]
id = "GHSA-4992-7rv2-5pvq"
reason = "undici@5.29.0 via @actions/github@6.x (see above). We do not use the `upgrade` option of undici anywhere, so CRLF injection via that option is not reachable."

